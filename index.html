<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuminaFrame Studio – Live Streaming, Photo & Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: #8A6E2F;
      --dark: #0A0A08;
      --dark-2: #111110;
      --dark-3: #1A1A17;
      --dark-4: #252520;
      --cream: #F5F0E8;
      --cream-dim: #CCC4B0;
      --white: #FDFCF9;
      --red-accent: #C44B2B;
      --font-display: 'Cormorant Garamond', serif;
      --font-ui: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--dark);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
      cursor: none;
    }
    #root { min-height: 100vh; }

    /* CUSTOM CURSOR */
    .cursor-dot {
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease;
    }
    .cursor-ring {
      width: 36px; height: 36px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.12s ease, width 0.2s, height 0.2s, opacity 0.2s;
      opacity: 0.5;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark-2); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 0 4rem;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,10,8,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(201,168,76,0.15);
      transition: all 0.3s ease;
    }
    .nav-logo {
      font-family: var(--font-ui);
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .nav-logo span { color: var(--gold); }
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
      align-items: center;
    }
    .nav-links a {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream-dim);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.3s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-cta {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 24px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      cursor: pointer;
      transition: all 0.3s;
    }
    .nav-cta:hover { background: var(--gold); color: var(--dark); }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
    }
    .hamburger span {
      width: 24px; height: 1.5px;
      background: var(--cream);
      transition: all 0.3s;
      display: block;
    }

    /* SECTIONS */
    .page-section {
      min-height: 100vh;
      padding-top: 72px;
    }
    .section-hidden { display: none; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }
    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8rem 5rem 6rem 6rem;
      position: relative;
      z-index: 2;
    }
    .hero-tag {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-tag::before {
      content: '';
      display: block;
      width: 32px; height: 1px;
      background: var(--gold);
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(56px, 5.5vw, 84px);
      font-weight: 300;
      line-height: 1.05;
      color: var(--white);
      margin-bottom: 1.5rem;
    }
    .hero-title em {
      font-style: italic;
      color: var(--gold-light);
    }
    .hero-desc {
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 300;
      color: var(--cream-dim);
      max-width: 420px;
      line-height: 1.8;
      margin-bottom: 3rem;
    }
    .hero-actions {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }
    .btn-primary {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 14px 36px;
      background: var(--gold);
      color: var(--dark);
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-ghost {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cream-dim);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s;
    }
    .btn-ghost:hover { color: var(--gold); }
    .btn-ghost .arrow { font-size: 18px; }
    .hero-stats {
      display: flex;
      gap: 3rem;
      margin-top: 4rem;
      padding-top: 2.5rem;
      border-top: 0.5px solid rgba(201,168,76,0.2);
    }
    .stat-item {}
    .stat-num {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 300;
      color: var(--white);
      line-height: 1;
    }
    .stat-num span { color: var(--gold); font-size: 28px; }
    .stat-label {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 300;
      color: var(--cream-dim);
      letter-spacing: 0.05em;
      margin-top: 4px;
    }

    .hero-right {
      position: relative;
      overflow: hidden;
    }
    .hero-visual-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
    }
    .hero-img-block {
      background: var(--dark-3);
      position: relative;
      overflow: hidden;
    }
    .hero-img-block.tall { grid-row: span 2; }
    .hero-img-inner {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--gold-dim);
    }
    .hero-img-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.4; }
    .hero-img-label {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.4;
      color: var(--cream-dim);
    }
    /* Cinematic overlay */
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, var(--dark) 0%, transparent 40%);
      z-index: 1;
      pointer-events: none;
    }

    /* Live badge */
    .live-badge {
      position: absolute;
      top: 24px; right: 24px;
      z-index: 3;
      background: var(--red-accent);
      color: white;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: white;
      border-radius: 50%;
      animation: pulse-live 1.2s infinite;
    }
    @keyframes pulse-live {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── SECTION HEADER ── */
    .sec-header {
      text-align: center;
      margin-bottom: 5rem;
    }
    .sec-tag {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .sec-tag::before, .sec-tag::after {
      content: '';
      display: block;
      width: 40px; height: 0.5px;
      background: var(--gold-dim);
    }
    .sec-title {
      font-family: var(--font-display);
      font-size: clamp(38px, 4vw, 60px);
      font-weight: 300;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 1.2rem;
    }
    .sec-title em { font-style: italic; color: var(--gold-light); }
    .sec-desc {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 300;
      color: var(--cream-dim);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* ── LAYANAN PAGE ── */
    .page-layanan {
      padding: 6rem 6rem 8rem;
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5px;
      background: rgba(201,168,76,0.1);
    }
    .service-card {
      background: var(--dark-2);
      padding: 3.5rem 2.5rem;
      position: relative;
      overflow: hidden;
      transition: background 0.4s;
    }
    .service-card:hover { background: var(--dark-3); }
    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .service-card:hover::before { transform: scaleX(1); }
    .svc-number {
      font-family: var(--font-display);
      font-size: 72px;
      font-weight: 300;
      color: rgba(201,168,76,0.08);
      line-height: 1;
      margin-bottom: 1.5rem;
      transition: color 0.4s;
    }
    .service-card:hover .svc-number { color: rgba(201,168,76,0.15); }
    .svc-icon {
      width: 52px; height: 52px;
      border: 1px solid rgba(201,168,76,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 1.5rem;
      transition: border-color 0.3s, background 0.3s;
    }
    .service-card:hover .svc-icon {
      border-color: var(--gold);
      background: rgba(201,168,76,0.08);
    }
    .svc-name {
      font-family: var(--font-ui);
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 0.75rem;
      letter-spacing: 0.02em;
    }
    .svc-desc {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      color: var(--cream-dim);
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    .svc-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .svc-features li {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--cream-dim);
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .svc-features li::before {
      content: '—';
      color: var(--gold-dim);
      flex-shrink: 0;
      margin-top: 1px;
    }
    .svc-price-tag {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 0.5px solid rgba(201,168,76,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .svc-from {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream-dim);
    }
    .svc-price {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 300;
      color: var(--gold-light);
    }
    .paket-section {
      margin-top: 6rem;
    }
    .paket-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 4rem;
    }
    .paket-card {
      border: 0.5px solid rgba(201,168,76,0.2);
      padding: 2.5rem;
      position: relative;
      transition: border-color 0.3s;
    }
    .paket-card:hover { border-color: rgba(201,168,76,0.5); }
    .paket-card.featured {
      border-color: var(--gold);
      background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 100%);
    }
    .featured-badge {
      position: absolute;
      top: -1px; left: 50%;
      transform: translateX(-50%);
      background: var(--gold);
      color: var(--dark);
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 5px 18px;
    }
    .paket-name {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .paket-price {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 300;
      color: var(--white);
      line-height: 1;
      margin: 0.75rem 0;
    }
    .paket-price small {
      font-size: 18px;
      color: var(--cream-dim);
    }
    .paket-tagline {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 300;
      color: var(--cream-dim);
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 0.5px solid rgba(201,168,76,0.1);
    }
    .paket-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .paket-list li {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 300;
      color: var(--cream-dim);
      display: flex;
      gap: 10px;
    }
    .paket-list li .check { color: var(--gold); font-size: 14px; }

    /* ── ARTIKEL PAGE ── */
    .page-artikel { padding: 6rem 6rem 8rem; }
    .artikel-hero-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 0.5px solid rgba(201,168,76,0.2);
      margin-bottom: 3rem;
      overflow: hidden;
    }
    .artikel-hero-img {
      background: var(--dark-3);
      min-height: 420px;
      display: flex; align-items: center; justify-content: center;
      font-size: 60px;
      color: rgba(201,168,76,0.2);
      position: relative;
    }
    .artikel-hero-img .cat-pill {
      position: absolute; top: 20px; left: 20px;
      background: var(--gold);
      color: var(--dark);
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 5px 14px;
    }
    .artikel-hero-content {
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .artikel-meta {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 300;
      color: var(--cream-dim);
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }
    .artikel-title-big {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 300;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .artikel-title-big em { font-style: italic; color: var(--gold-light); }
    .artikel-excerpt {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      color: var(--cream-dim);
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }
    .btn-read {
      align-self: flex-start;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: gap 0.3s;
    }
    .btn-read:hover { gap: 14px; }
    .artikel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .artikel-card {
      border: 0.5px solid rgba(201,168,76,0.15);
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .artikel-card:hover { border-color: rgba(201,168,76,0.4); }
    .artikel-card-img {
      height: 200px;
      background: var(--dark-3);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      color: rgba(201,168,76,0.15);
      position: relative;
      overflow: hidden;
    }
    .artikel-card-img .cat-pill {
      position: absolute; top: 12px; left: 12px;
      font-family: var(--font-ui);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      background: rgba(201,168,76,0.15);
      color: var(--gold);
      border: 0.5px solid rgba(201,168,76,0.3);
    }
    .artikel-card-body { padding: 1.5rem; }
    .artikel-card-meta {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 300;
      color: var(--cream-dim);
      margin-bottom: 0.75rem;
    }
    .artikel-card-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 300;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }
    .artikel-card-excerpt {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 300;
      color: var(--cream-dim);
      line-height: 1.7;
    }

    /* ── PORTFOLIO PAGE ── */
    .page-portfolio { padding: 6rem 6rem 8rem; }
    .portfolio-filter {
      display: flex;
      gap: 0;
      margin-bottom: 3rem;
      border: 0.5px solid rgba(201,168,76,0.2);
      overflow: hidden;
      width: fit-content;
    }
    .filter-btn {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 24px;
      background: transparent;
      color: var(--cream-dim);
      border: none;
      border-right: 0.5px solid rgba(201,168,76,0.2);
      cursor: pointer;
      transition: all 0.3s;
    }
    .filter-btn:last-child { border-right: none; }
    .filter-btn.active { background: var(--gold); color: var(--dark); }
    .filter-btn:hover:not(.active) { background: rgba(201,168,76,0.08); color: var(--gold); }
    .portfolio-masonry {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .porto-item {
      background: var(--dark-3);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .porto-item:nth-child(1) { grid-row: span 2; }
    .porto-item:nth-child(5) { grid-column: span 2; }
    .porto-visual {
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: rgba(201,168,76,0.12);
      position: relative;
    }
    .porto-item:nth-child(1) .porto-visual,
    .porto-item:nth-child(5) .porto-visual { height: 380px; }
    .porto-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,8,0.95) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
    }

// ── MAIN APP ──────────────────────────────────────────────────────
function App() {
  const [activePage, setActivePage] = useState('home');
  const [toast, setToast] = useState({ msg: '', show: false });
  const [mobileMenu, setMobileMenu] = useState(false);

  useEffect(() => {
    const dot = document.getElementById('cursorDot');
    const ring = document.getElementById('cursorRing');
    let mouseX = 0, mouseY = 0;
    const onMove = (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      dot.style.transform = `translate(${mouseX - 4}px, ${mouseY - 4}px)`;
      ring.style.transform = `translate(${mouseX - 18}px, ${mouseY - 18}px)`;
    };
    document.addEventListener('mousemove', onMove);
    return () => document.removeEventListener('mousemove', onMove);
  }, []);

  const goTo = (page) => {
    setActivePage(page);
    setMobileMenu(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const showToast = (msg) => {
    setToast({ msg, show: true });
    setTimeout(() => setToast(t => ({...t, show: false})), 3500);
  };

  const navItems = [
    { id: 'layanan', label: 'Layanan' },
    { id: 'artikel', label: 'Artikel' },
    { id: 'portfolio', label: 'Portfolio' },
    { id: 'tentang', label: 'Tentang' },
  ];

  return (
    <>
      <nav>
        <div className="nav-logo" onClick={() => goTo('home')}>
          LUMINA<span>FRAME</span>
        </div>
        <ul className="nav-links">
          {navItems.map(n => (
            <li key={n.id}>
              <a className={activePage === n.id ? 'active' : ''} onClick={() => goTo(n.id)}>{n.label}</a>
            </li>
          ))}
        </ul>
        <button className="nav-cta" onClick={() => goTo('kontak')}>Hubungi Kami</button>
        <button className="hamburger" onClick={() => setMobileMenu(!mobileMenu)}>
          <span></span><span></span><span></span>
        </button>
      </nav>

      {mobileMenu && (
        <div style={{
          position:'fixed', top:'72px', left:0, right:0, zIndex:999,
          background:'var(--dark-2)', borderBottom:'0.5px solid rgba(201,168,76,0.15)',
          padding:'1.5rem 2rem', display:'flex', flexDirection:'column', gap:'0'
        }}>
          {[...navItems, {id:'kontak', label:'Kontak'}].map(n => (
            <button key={n.id} onClick={() => goTo(n.id)} style={{
              background:'none', border:'none', borderBottom:'0.5px solid rgba(201,168,76,0.08)',
              padding:'1rem 0', textAlign:'left', color: activePage === n.id ? 'var(--gold)' : 'var(--cream)',
              fontFamily:'var(--font-ui)', fontSize:'14px', fontWeight:'500',
              letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer'
            }}>{n.label}</button>
          ))}
        </div>
      )}

      <main>
        {activePage === 'home' && <SectionHero goTo={goTo} />}
        {activePage === 'layanan' && <PageLayanan goTo={goTo} />}
        {activePage === 'artikel' && <PageArtikel />}
        {activePage === 'portfolio' && <PagePortfolio />}
        {activePage === 'tentang' && <PageTentang />}
        {activePage === 'kontak' && <PageKontak showToast={showToast} />}
      </main>

      <footer>
        <div className="footer-logo">LUMINA<span>FRAME</span></div>
        <p className="footer-copy">© 2025 LuminaFrame Studio · Yogyakarta</p>
        <ul className="footer-links">
          {navItems.map(n => (
            <li key={n.id}><a onClick={() => goTo(n.id)}>{n.label}</a></li>
          ))}
          <li><a onClick={() => goTo('kontak')}>Kontak</a></li>
        </ul>
      </footer>

      <div className={`toast ${toast.show ? 'show' : ''}`}>{toast.msg}</div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
